services:
  db:
    image: postgres:17
    container_name: stego-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stegosign}
      POSTGRES_USER: ${POSTGRES_USER:-sre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sre}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sre} -d ${POSTGRES_DB:-stegosign}"]
      interval: 10s
      timeout: 5s
      retries: 5

  files:
    image: quay.io/minio/aistor/minio:latest
    container_name: stego-files
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fn-stella-sre}
    volumes:
      - minio_data:/mnt/data
      - ./minio.license:/minio.license:ro
    command: server /mnt/data --console-address :${MINIO_CONSOLE_PORT:-9003} --license /minio.license
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
  pg_data: