services:
  db:
    image: postgres:17
    container_name: stego-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  files:
    image: quay.io/minio/aistor/minio:latest
    container_name: stego-files
    restart: unless-stopped
    expose:
      - "9000"                          # siempre 9000, fijo
    ports:
      - "${STORAGE_CONSOLE_PORT}:9001"  # consola web: 55546 → 9001
    environment:
      MINIO_ROOT_USER:     ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - minio_data:/mnt/data
      - ./minio.license:/minio.license:ro
    command: server /mnt/data --console-address :9001 --license /minio.license
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stego-server
    restart: unless-stopped
    environment:
      DATABASE_URL:       postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      STORAGE_ENDPOINT:   http://files:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      SERVER_HOST:        0.0.0.0
      SERVER_PORT:        4000
      RUST_LOG:           ${RUST_LOG}
      SIGNING_KEY:        ${SIGNING_KEY}
      VERIFY_KEY:         ${VERIFY_KEY}
      APP_BASE_URL:       ${APP_BASE_URL}
    expose:
      - "4000"
    depends_on:
      - db
      - files

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        API_BASE_URL:        http://server:4000
        PUBLIC_API_BASE_URL: http://localhost:${APP_PORT}
    container_name: stego-app
    restart: unless-stopped
    environment:
      APP_ENV:             ${APP_ENV}
      API_BASE_URL:        http://server:4000
      PUBLIC_API_BASE_URL: http://localhost:${APP_PORT}
      LEPTOS_OUTPUT_NAME:  ${LEPTOS_OUTPUT_NAME}
      LEPTOS_SITE_ROOT:    ${LEPTOS_SITE_ROOT}
      LEPTOS_SITE_PKG_DIR: ${LEPTOS_SITE_PKG_DIR}
      LEPTOS_SITE_ADDR:    0.0.0.0:3000
    ports:
      - "${APP_PORT}:300"
    depends_on:
      - server

volumes:
  pg_data:
  minio_data: